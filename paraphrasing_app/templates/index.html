<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Paraphrasing Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="container">
        <h1>AI Paraphrasing Tool</h1>

        <form id="paraphraseForm">
            <textarea id="textInput" placeholder="Enter your sentence..." required></textarea>
            <button type="submit">Generate Paraphrases</button>
        </form>

        <div id="loader">
            <div class="spinner"></div>
        </div>

        <div class="result">
            <h2>Paraphrased Versions</h2>
            <ul id="resultList"></ul>
        </div>
    </div>

    <script>
        const form = document.getElementById('paraphraseForm');
        const loader = document.getElementById('loader');
        const resultList = document.getElementById('resultList');

        loader.style.display = 'none';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            resultList.innerHTML = '';
            loader.style.display = 'block';

            const text = document.getElementById('textInput').value;

            const response = await fetch('/api/paraphrase', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });

            const data = await response.json();

            loader.style.display = 'none';

            if (data.paraphrased_texts) {
                data.paraphrased_texts.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    resultList.appendChild(li);
                });
            } else {
                alert(data.error);
            }
        });
    </script>
</body>
</html>
