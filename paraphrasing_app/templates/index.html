<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Paraphrasing Tool</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>

    <div class="container">

        <h1>✨ AI Paraphrasing Tool</h1>
        <p class="subtitle">Generate smarter, clearer, and more natural sentences</p>

        <!-- FORM -->
        <form id="paraphraseForm">
            <textarea id="textInput" placeholder="Type your sentence here..." required></textarea>
            <button type="submit">Generate</button>
        </form>

        <!-- LOADER -->
        <div id="loader">
            <div class="spinner"></div>
            <p>Generating smart paraphrases...</p>
        </div>

        <!-- RESULTS -->
        <div class="result">
            <h2>Results</h2>
            <ul id="resultList"></ul>
        </div>

    </div>

    <!-- JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
